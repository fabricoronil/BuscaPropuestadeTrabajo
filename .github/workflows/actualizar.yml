# ============================================================
# ACTUALIZACIÓN AUTOMÁTICA EN LA NUBE (GitHub Actions)
# Corre todos los días a las 7:00 (hora Argentina) y también
# a mano desde la pestaña "Actions" de GitHub → "Run workflow".
# ============================================================
name: Actualizar empleos

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 07:00 Argentina
  workflow_dispatch:        # habilita el botón "Run workflow"

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 40     # si algo se cuelga de verdad, corta a los 40 min
    permissions:
      contents: write       # permiso para hacer push del JSON

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ejecutar el extractor
        # -u = sin buffer: los mensajes aparecen en vivo en el log
        # (el extractor tarda 10-20 min por sus pausas anti-bloqueo: es normal)
        run: python -u extractor.py

      - name: Subir empleos.json si hay cambios
        run: |
          # Protección: si encontró muy pocas ofertas (bloqueo de portales),
          # NO subimos nada para no pisar los datos buenos que ya están online.
          TOTAL=$(python -c "import json; print(json.load(open('empleos.json')).get('total', 0))")
          echo "Ofertas encontradas en esta corrida: $TOTAL"
          if [ "$TOTAL" -lt 5 ]; then
            echo "Muy pocas ofertas: los portales probablemente bloquearon a GitHub. No se sube nada."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add empleos.json
          if git diff --cached --quiet; then
            echo "Sin cambios. Nada que subir."
            exit 0
          fi
          git commit -m "Auto-update jobs"
          # Regla: empleos.json se regenera completo, así que nunca se fusiona.
          # Si hay conflicto, ganan los datos recién extraídos (-X theirs).
          if ! git pull --rebase -X theirs origin main; then
            # Plan B infalible: alinearse con el repo y reaplicar los datos encima
            git rebase --abort || true
            cp empleos.json /tmp/empleos_nuevos.json
            git fetch origin
            git reset --hard origin/main
            cp /tmp/empleos_nuevos.json empleos.json
            git add empleos.json
            git commit -m "Auto-update jobs"
          fi
          git push || (git pull --rebase -X theirs origin main && git push)
