# ============================================================
# ACTUALIZACIÓN AUTOMÁTICA EN LA NUBE (GitHub Actions)
# Corre todos los días a las 7:00 (hora Argentina) y también
# a mano desde la pestaña "Actions" de GitHub → "Run workflow".
# ============================================================
name: Actualizar empleos

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 07:00 Argentina
  workflow_dispatch:        # habilita el botón "Run workflow"

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # permiso para hacer push del JSON

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Ejecutar el extractor
        run: python extractor.py

      - name: Subir empleos.json si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add empleos.json
          git diff --cached --quiet || git commit -m "Auto-update jobs"
          git push
